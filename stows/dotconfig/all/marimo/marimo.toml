[diagnostics]
sql_linter = true
enabled = true

[server]
browser = "default"
follow_symlink = false

[experimental]

[completion]
activate_on_typing = true
copilot = false

[package_management]
manager = "uv"

[keymap]
destructive_delete = true
preset = "default"

[keymap.overrides]

[runtime]
auto_instantiate = true
reactive_tests = true
default_auto_download = []
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
output_max_bytes = 8000000
on_cell_change = "autorun"
default_sql_output = "auto"
auto_reload = "lazy"

[language_servers.ty]

[language_servers.pylsp]
enable_pydocstyle = false
enable_ruff = true
enable_pyflakes = false
enable_pylint = false
enable_flake8 = false
enable_mypy = true
enabled = false

[language_servers.basedpyright]
enabled = true

[save]
autosave = "after_delay"
format_on_save = true
autosave_delay = 1000

[formatting]
line_length = 99

[display]
default_table_page_size = 10
dataframes = "rich"
reference_highlighting = true
theme = "dark"
default_table_max_columns = 50
default_width = "columns"
cell_output = "below"
code_editor_font_size = 15

[datasources]

[ai]
rules = ""
mode = "manual"
inline_tooltip = false

[ai.models]
displayed_models = []
chat_model = "google/gemini-2.5-pro"
custom_models = []

[mcp]
presets = []

[mcp.mcpServers]

[snippets]
custom_paths = []
include_default_snippets = true
