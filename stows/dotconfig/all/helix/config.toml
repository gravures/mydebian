# ~/.config/helix/config.toml

theme = "franky"

[editor]
scrolloff = 5
mouse = true
default-yank-register = "+"
middle-click-paste = true
scroll-lines = 2
shell = ["sh", "-c"]
line-number = "absolute"
cursorline = true
cursorcolumn = false
continue-comments = true
auto-completion = true
path-completion = true
auto-format = true
idle-timeout = 250
completion-timeout = 350
preview-completion-insert = true
completion-trigger-len = 2
completion-replace = false
auto-info = true
undercurl = false
rulers = [99]
bufferline = "always"
color-modes = true
text-width = 99
default-line-ending = "native"
insert-final-newline = true
popup-border = "none"
indent-heuristic = "hybrid"
jump-label-alphabet = "abcdefghijklmnopqrstuvwxyz"
end-of-line-diagnostics = "error"

[editor.statusline]
left = [
  "mode",
  "spinner",
  "file-name",
  "read-only-indicator",
  "file-modification-indicator",
  "version-control",
]
center = ["separator", "file-type"]
right = [
  "diagnostics",
  "selections",
  "register",
  "position",
  "total-line-numbers",
]
separator = "▏"
mode.normal = "NOR"
mode.insert = "INS"
mode.select = "SEL"

[editor.lsp]
enable = true
display-messages = true
display-progress-messages = false
display-inlay-hints = true
inlay-hints-length-limit = 16
display-color-swatches = true
auto-signature-help = true
display-signature-help-docs = true
auto-document-highlight = true
snippets = true
goto-reference-include-declaration = true

[editor.inline-diagnostics]
cursor-line = "info"
other-lines = "disable"
prefix-len = 2
max-wrap = 20
max-diagnostics = 20

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false
follow-symlinks = true
deduplicate-links = true
parents = true
ignore = true
git-ignore = true
git-global = true
git-exclude = true

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'<' = '>'

[editor.auto-save]
focus-lost = false
after-delay.enable = false
after-delay.timeout = 3000

[editor.search]
smart-case = true
wrap-around = true

[editor.whitespace]

[editor.indent-guides]
render = true
character = "▏" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.gutters]
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

[editor.gutters.line-numbers]
min-width = 3

# [editor.gutters.diagnostics]
# unused

# [editor.gutters.diff]
# unused

# [editor.gutters.spacers]
# unused

[editor.soft-wrap]
enable = true
max-wrap = 20
max-indent-retain = 10
wrap-indicator = '↪" '
wrap-at-text-width = false

[editor.smart-tab]
enable = true
supersede-menu = false

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
ins = [
  "insert_mode",
  ":set-option end-of-line-diagnostics disable",
  ":set-option inline-diagnostics.cursor-line disable",
  ":set-option inline-diagnostics.max-diagnostics 0",
]
backspace = ["insert_mode", "delete_char_backward"]
del = "select_mode"
tab = "move_parent_node_end"
S-tab = "move_parent_node_start"
"=" = "select_register"
S-up = "page_cursor_up"
S-down = "page_cursor_down"
'C-/' = "rotate_view"
C-right = "goto_next_buffer"
C-left = "goto_previous_buffer"
C-up = ["delete_selection", "move_line_up", "paste_before"]
C-down = ["delete_selection", "paste_after"]

# C-u = ":sh tmux display-popup '~/.config/helix/yazi-picker.sh'"

## Minors modes
[keys.normal.space]

[keys.normal."#"]
"k" = "hover"
"#" = "code_action"
"'" = "rename_symbol"
";" = "goto_definition"
"]" = ":lsp-workspace-command"
"h" = ":set-option end-of-line-diagnostics disable"
"H" = ":set-option end-of-line-diagnostics error"
"s" = ":lsp-stop"
"r" = ":lsp-restart"
"/" = [ # Zen Mode
  ":set bufferline never",
  ':set gutters.layout ["spacer", "spacer", "spacer", "spacer", "spacer", "spacer", "spacer", "spacer", "diagnostics", "spacer", "spacer"]',
  ":set soft-wrap.wrap-at-text-width true",
  ":set end-of-line-diagnostics disable",
  # ":theme franky_bak",
]

[keys.normal."'"]
"/" = ":config-reload"
"c" = ":config-open"
"l" = ":o ~/.config/helix/languages.toml"
"y" = [ # Yazi
  ":write-all",
  ":new",
  ":insert-output ~/.config/helix/yazi-picker.sh",
  ":set mouse false",
  ":set mouse true",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]
"s" = [ # Grep-picker
  ":write-all",
  ":new",
  ":insert-output ~/.config/helix/grep-picker.sh %{selection}",
  ":set mouse false",
  ":set mouse true",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]
"t" = [ # task-picker
  ":write-all",
  ":new",
  ":insert-output ~/.config/helix/task-picker.sh",
  ":set mouse false",
  ":set mouse true",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]
"g" = [ # Lazygit
  ":write-all",
  ":new",
  ":insert-output lazygit",
  ":set mouse false",       # First disable mouse to hint helix into activating it
  ":set mouse true",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]
"p" = [ # Markdown Preview
  ":write-all",
  ":sh tmux display-popup -d %{current_working_directory} -w 44%% -h 94%% -E 'streamdown %{buffer_name} | less -R'",
]
"P" = [ # Markdown Inplace Preview
  ":write-all",
  ":sh export HX_BUFFER_NAME=%{buffer_name}",
  ":new",
  ":insert-output frogmouth ${HX_BUFFER_NAME}",
  # ":insert-output streamdown ${HX_BUFFER_NAME} | bat",
  ":set mouse false",
  ":set mouse true",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]
"T" = [ # task-code
  ":sh task-code",
  ":set mouse false", # First disable mouse to hint helix into activating it
  ":set mouse true",
]

[keys.insert]
# esc = "no_op"
del = "select_mode"
ins = [
  "normal_mode",
  ":set-option end-of-line-diagnostics error",
  ":set-option inline-diagnostics.cursor-line warning",
  ":set-option inline-diagnostics.max-diagnostics 10",
]
S-tab = "move_parent_node_start"
'C-/' = "rotate_view"
C-right = "goto_next_buffer"
C-left = "goto_previous_buffer"
C-r = ":config-reload"

[keys.select]
# esc = "no_op"
del = [
  "normal_mode",
  ":set-option end-of-line-diagnostics error",
  ":set-option inline-diagnostics.cursor-line warning",
  ":set-option inline-diagnostics.max-diagnostics 10",
]
ins = [
  "insert_mode",
  ":set-option end-of-line-diagnostics disable",
  ":set-option inline-diagnostics.cursor-line disable",
  ":set-option inline-diagnostics.max-diagnostics 0",
]
tab = "extend_parent_node_end"
S-tab = "extend_parent_node_start"
"=" = "select_register"

[keys.select."#"]
"f" = "format_selections"
"c" = ":pipe cpicker"
