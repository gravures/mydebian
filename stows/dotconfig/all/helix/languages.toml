##
# Ltex-ls-plus
# see: https://ltex-plus.github.io/ltex-plus/settings.html for server options.
#
# NOTE: works with ltapiserv-rs too except the proper content
# type is not sent in the requests.
# (https://github.com/cpg314/ltapiserv-rs?tab=readme-ov-file#ltex-ls-language-server-protocol-for-markup)
[language-server.ltex-ls-plus]
command = "ltex-ls-plus"
args = ["--no-endless"]

[language-server.ltex-ls-plus.config.ltex]
"ltex-ls" = { path = "/home/gilles/.local/app/ltex-ls-plus-18.6.1" }
languageShortCode = "en-US"
disabledRules = { "en-US" = ["PROFANITY"] }
dictionary = { "en-US" = ["builtin"] }
# languageToolHttpServerUri = "http://localhost:8875"
completionEnabled = true
checkFrequency = "edit"  # edit | save | manual
trace.server = "verbose" # off | messages | verbose


##
# Harper
[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]

[language-server.harper-ls.config.harper-ls]
diagnosticSeverity = "warning"
isolateEnglish = true
dialect = "American"
maxFileLength = 120000
ignoredLintsPath = ""
excludePatterns = []

[language-server.harper-ls.config.harper-ls.linters]
SpellCheck = true
SpelledNumbers = false
AnA = true
UnclosedQuotes = true
WrongQuotes = true
LongSentences = false
RepeatedWords = true
Spaces = true
Matcher = true
CorrectNumberSuffix = true
SentenceCapitalization = false
TodoHypen = false
OrthographicConsistency = false
EllipsisLength = false

[language-server.harper-ls.config.harper-ls.codeActions]
ForceStable = true

[language-server.harper-ls.config.harper-ls.markdown]
IgnoreLinkTitle = false


##
# Markdown
[[language]]
name = "markdown"
scope = "source.markdown"
injection-regex = "md|markdown"
file-types = [
  "md",
  "livemd",
