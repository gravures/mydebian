##
# Rst - RestructuredText
[language-server.esbonio]
command = "esbonio"

[[language]]
name = "rst"
scope = "source.rst"
injection-regex = "rst"
file-types = ["rst"]
comment-token = ".."
indent = { tab-width = 3, unit = "   " }
roots = ["pyproject.toml", ".git"]
language-servers = [{ name = "esbonio" }, { name = "helix" }]

##
# Rust
[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server.rust-analyzer.config.cargo]
features = "all"

##
# Bash
[language-server.bash-language-server.config]
backgroundAnalysisMaxFiles = 1
includeAllWorkspaceSymbols = true
shellcheckExternalSources = true
# shellcheckArguments = "-P PATH"

[[language]]
name = "bash"
scope = "source.bash"
file-types = ["bash", "sh", "bob", "pacstall", "pacscript", "conf"]
language-servers = [
  { name = "bash-language-server", except-features = [
    "format",
  ] },
  { name = "helix" },
  { name = "harper-ls" },
]
indent = { tab-width = 4, unit = "\t" }
diagnostic-severity = "hint"
formatter = { command = "shfmt" }
auto-format = true


##
# SCSS & CSS
# see https://wkillerud.github.io/some-sass/language-server/settings.html
[language-server.some-sass]
command = "some-sass-language-server"
args = ["--stdio"]

[language-server.some-sass.config.somesass.workspace]
loadPaths = ["**/*.scss", "**/*.sass"]

[language-server.some-sass.config.somesass.scss.completion]
suggestFromUseOnly = true

[[language]]
name = "scss"
scope = "source.scss"
file-types = ["scss", "sass", "astro"]
language-servers = [{ name = "some-sass", except-features = ["format"] }]
indent = { tab-width = 2, unit = "  " }
comment-tokens = ["//", "///"]
diagnostic-severity = "hint"
block-comment-tokens = { start = "/*", end = "*/" }
formatter = { command = "prettier", args = ["--parser=scss"] }
auto-format = false
injection-regex = "scss"

[[language]]
name = "css"
scope = "source.css"
file-types = ["css"]
language-servers = [
  { name = "some-sass", except-features = [
    "format",
  ] },
  { name = "helix" },
  { name = "codebook" },
]
indent = { tab-width = 2, unit = "  " }
diagnostic-severity = "hint"
formatter = { command = "prettier", args = ["--parser=css"] }
auto-format = true


##
# Typescript
[language-server.biome]
command = "npm"
args = ["exec", "--no", "--", "biome", "lsp-proxy"]

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]
config.hostInfo = "helix"

[language-server.typescript-language-server.config.typescript.inlayHints]
includeInlayEnumMemberValueHints = true
includeInlayFunctionLikeReturnTypeHints = true
includeInlayFunctionParameterTypeHints = true
includeInlayParameterNameHints = "all"
includeInlayParameterNameHintsWhenArgumentMatchesName = true
includeInlayPropertyDeclarationTypeHints = true
includeInlayVariableTypeHints = true

[language-server.typescript-language-server.config.javascript.inlayHints]
includeInlayEnumMemberValueHints = true
includeInlayFunctionLikeReturnTypeHints = true
includeInlayFunctionParameterTypeHints = true
includeInlayParameterNameHints = "all"
includeInlayParameterNameHintsWhenArgumentMatchesName = true
includeInlayPropertyDeclarationTypeHints = true
includeInlayVariableTypeHints = true

[[language]]
name = "typescript"
scope = "source.ts"
injection-regex = "(ts|typescript)"
language-id = "typescript"
file-types = ["ts", "mts", "cts"]
shebangs = ["deno", "bun", "ts-node"]
roots = ["package.json", "tsconfig.json"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  { name = "biome" },
  { name = "helix" },
  { name = "codebook" },
]
auto-format = true
indent = { tab-width = 4, unit = "    " }
# formatter = { command = "prettier", args = ["--parser", "typescript"] }


##
# Astro
[language-server.astro-ls]
command = "astro-ls"
args = ["--stdio"]

[language-server.astro-ls.config]
contentIntellisense = true

[language-server.astro-ls.config.typescript]
tsdk = "/home/gilles/.nvm/versions/node/v23.7.0/lib/node_modules/typescript/lib"
environment = "node"

[[language]]
name = "astro"
scope = "source.astro"
injection-regex = "astro"
file-types = ["astro"]
roots = ["astro.config.mjs"]
language-servers = [
  { name = "astro-ls", except-features = [
    "format",
  ] },
