- role: user
  content: i've no direct control over scikit-build, i only install a package in a python environment. The build process always use all the cores, and i want it let some core unused. The only thing under my control is th CMAKE_ARGS env variable.
- role: assistant
  content: |-
    To limit CPU usage during `scikit-build` builds (when using CMake), you can pass `CMAKE_JOB_THREADS` or `CMAKE_CXX_FLAGS` with `-j` (number of jobs) to control parallelism. Since you control `CMAKE_ARGS`, here’s how to enforce a **specific core limit**:

    ### **Solution: Set `CMAKE_JOB_THREADS`**
    ```bash
    CMAKE_ARGS="-DCMAKE_JOB_THREADS=2" pip install your_package
    ```
    - Replace `2` with your desired core limit (e.g., `4` for 4 cores).
    - This ensures CMake uses only the specified number of threads for parallel builds.

    ### **Alternative: Use `-j` in CMake Flags**
    If `CMAKE_JOB_THREADS` isn’t supported, try:
    ```bash
    CMAKE_ARGS="-DCMAKE_CXX_FLAGS='-j2'" pip install your_package
    ```
    *(Note: This may not work universally; `CMAKE_JOB_THREADS` is the standard approach.)*

    ### **Verify with `nproc`**
    To confirm your system’s core count:
    ```bash
    nproc --all  # Linux: shows total cores
    ```
    Adjust the limit accordingly.

    ### **Why This Works**
    - `scikit-build` relies on CMake’s parallel build system.
    - `CMAKE_JOB_THREADS` explicitly limits threads per job, preventing full-core saturation.
