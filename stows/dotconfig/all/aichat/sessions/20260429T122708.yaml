  content: |-
    You're absolutely right—`wait -t` is a **Linux-specific** feature (part of `wait` in Bash), and it’s not available on macOS (or Windows). Let’s fix this with **cross-platform solutions** that avoid magic numbers.

    ---

    ### **Solution 1: Use `timeout` (Works Everywhere)**
    ```bash
    timeout 3 go run your_program.go
    ```
    - **How it works**:
      - If the job exits cleanly, `timeout` waits for it.
      - If it hangs, it kills it after 3 seconds.
    - **Pros**:
      - Simple, portable, and reliable.
      - No need for PID tracking.

    ---

    ### **Solution 2: Use `pgrep` + `sleep` (Mac/Linux)**
    ```bash
    go run your_program.go &
    JOB_PID=$!
    sleep 3  # Wait 3 seconds (adjust as needed)
    if pgrep -f "your_program" >/dev/null; then
        kill "$JOB_PID" 2>/dev/null || true
    fi
    ```
    - **How it works**:
      - Starts the job, sleeps, then checks if it’s still running.
      - If `pgrep` finds it, kills it.
    - **Pros**:
      - Works on macOS/Linux.
      - No magic numbers if you tweak `sleep 3`.

    ---

    ### **Solution 3: Use `wait` + `kill` (Linux Only)**
    If you’re on Linux and can use `wait`:
    ```bash
    go run your_program.go &
    JOB_PID=$!
    wait "$JOB_PID"  # Waits indefinitely
    ```
    - **Problem**: If the job exits but goroutines linger, this blocks forever.
    - **Fix**: Add a timeout with `timeout` or `sleep` + `pgrep`.

    ---

    ### **Solution 4: Use `graceful shutdown` (If You Control Go)**
    If you can modify the Go program, add a **graceful exit flag**:
    ```go
    package main

    import (
        "os"
        "os/signal"
        "syscall"
    )

    var gracefulShutdown bool

    func main() {
        // Start long-running goroutine
        go func() {
            time.Sleep(10 * time.Second)
            if !gracefulShutdown {
                fmt.Println("Goroutine still running!")
            }
        }()

        // Wait for SIGINT (Ctrl+C) to trigger shutdown
        sigChan := make(chan os.Signal, 1)
        signal.Notify(sigChan, syscall.SIGINT)
        <-sigChan
        gracefulShutdown = true
        os.Exit(0)
    }
    ```
    - **How it works**:
      - The Go program detects lingering goroutines and exits cleanly.
      - Requires modifying the program, but avoids magic sleep times.

    ---

    ### **Key Takeaway**
    - **No magic numbers**: Use `timeout` (cross-platform) or `pgrep` + `sleep` (macOS/Linux).
    - **Avoid `sleep` alone**: It’s unreliable for goroutines.
    - **If you control Go**: Add a shutdown flag for proper cleanup.
