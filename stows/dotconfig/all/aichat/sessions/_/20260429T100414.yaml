- role: assistant
  content: |-
    In Python, you **cannot directly subclass a built-in tuple** because tuples are immutable and part of the language's core implementation. However, you can create a **custom tuple-like class** that behaves similarly to a tuple while allowing subclassing.

    ### **Approach: Create a Custom Tuple-Like Class**
    Here’s how you can define a class that mimics tuple behavior:

    #### **1. Basic Implementation**
    ```python
    class MyTuple:
        def __init__(self, *args):
            self._data = list(args)  # Store elements as a list (mutable)

        def __getitem__(self, index):
            return self._data[index]

        def __len__(self):
            return len(self._data)

        def __repr__(self):
            return f"MyTuple({self._data})"

        def __add__(self, other):
            if isinstance(other, MyTuple):
                return MyTuple(*self._data, *other._data)
            else:
                raise TypeError("Can only concatenate MyTuple with MyTuple")

        def __eq__(self, other):
            if isinstance(other, MyTuple):
                return self._data == other._data
            return False

    # Usage
    t1 = MyTuple(1, 2, 3)
    t2 = MyTuple(4, 5)
    print(t1 + t2)  # Output: MyTuple([1, 2, 3, 4, 5])
    print(len(t1))  # Output: 3
    print(t1[0])     # Output: 1
    ```

    #### **2. Making It Immutable (Like a True Tuple)**
    If you want an immutable version (like a real tuple), you can use `__slots__` and prevent modifications:

    ```python
    class ImmutableTuple:
        __slots__ = ('_data',)  # Prevents dynamic attribute addition

        def __init__(self, *args):
            self._data = tuple(args)  # Store as an actual tuple

        def __getitem__(self, index):
            return self._data[index]

        def __len__(self):
            return len(self._data)

        def __repr__(self):
            return f"ImmutableTuple({self._data})"

        def __add__(self, other):
            if isinstance(other, ImmutableTuple):
                return ImmutableTuple(*self._data, *other._data)
            raise TypeError("Can only concatenate ImmutableTuple with ImmutableTuple")

        def __eq__(self, other):
            if isinstance(other, ImmutableTuple):
                return self._data == other._data
            return False

    # Usage
    t1 = ImmutableTuple(1, 2, 3)
    t2 = ImmutableTuple(4, 5)
    print(t1 + t2)  # Output: ImmutableTuple((1, 2, 3, 4, 5))
    ```

    ### **Key Features**
    ✅ **Supports indexing (`t[0]`)**
    ✅ **Supports concatenation (`t1 + t2`)**
    ✅ **Supports equality comparison (`t1 == t2`)**
    ✅ **Can be immutable (like a real tuple)**

    ### **Limitations**
    ❌ **Cannot modify elements after creation** (unless using a mutable list internally).
    ❌ **Does not support all tuple methods** (e.g., `count()`, `index()`).

    ### **Alternative: Use `collections.namedtuple`**
    If you just need a lightweight immutable tuple with named fields:
    ```python
    from collections import namedtuple

    Person = namedtuple('Person', ['name', 'age'])
    p = Person("Alice", 30)
    print(p.name)  # Output: Alice
    ```

    ### **Conclusion**
    - If you need a **mutable-like tuple**, use a class with `__getitem__` and `__len__`.
    - If you need an **immutable tuple**, use `__slots__` and store elements as a real tuple.
    - For **named tuples**, consider `collections.namedtuple`.

