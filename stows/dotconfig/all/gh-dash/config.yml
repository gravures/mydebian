prSections:
  - title: My PR
    filters: is:open author:@me
  - title: Needs Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
  - title: Commented
    filters: commenter:@me
  - title: Subscribed
    filters: "\
      repo:helix-editor/helix \
      repo:joshmedeski/sesh \
      repo:sxyazi/yazi"
  - title: LSP
    filters: "-author:app/dependabot -author:app/github-action \
      repo:typescript-language-server/typescript-language-server"
issuesSections:
  - title: My Issues
    filters: author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
  - title: Commented
    filters: is:open commenter:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
repoPaths:
  gravures/*: ~/DEVELOPPEMENT/REPOS/*
  gravures/tmux-zen-status: ~/.tmux/plugins/tmux-zen-status
  gravures/tmux-helix-session: ~/.tmux/plugins/tmux-helix-session
defaults:
  view: prs
  preview:
    open: true
    width: 0.45
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  layout:
    prs:
      repoName:
        grow: true,
        width: 10
        hidden: false
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit
  prs:
    - key: C
      builtin: checkout
    - key: m
      command: gh pr merge --admin --repo {{.RepoName}} {{.PrNumber}}
    - key: O
      name: code review
      command: >
        tmux new-window -n {{.RepoName}}
        'hx'
    - key: T
      command: >-
        tmux new-window -n "enhance" '
          gh enhance -R {{.RepoName}} {{.PrNumber}}
        '
    - key: v
      name: approve
      command: >
        gh pr review --repo {{.RepoName}} --approve --body "$(gum input --prompt='Approval Comment: ')" {{.PrNumber}}
  notifications:
    - key: d
      builtin: markAsDone
    - key: D
      builtin: markAllAsDone
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
  colors:
    text:
      primary: "#c9c9c9"
      secondary: "#749fd4"
      inverted: "#242347"
      faint: "#B0B3BF"
      warning: "#ba8d45"
      error: "#bb3831"
      success: "#94e2d5"
      actor: "#b1b1b1"
    background:
      selected: "#340c6f"
    border:
      primary: "#54595f"
      secondary: "#373e47"
      faint: "#2a2a3c"
pager:
  diff: diffnav
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
