# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
#:schema https://yazi-rs.github.io/schemas/keymap.json

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on = ["l", "<Right>"]
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = ["p"]
run = "plugin smart-paste"
desc = "Paste the files in CWD or hovered directory"

[[mgr.prepend_keymap]]
on = ["z"]
run = "plugin zoxide"
desc = "Jump to a directory using zoxide"

[[mgr.prepend_keymap]]
on = ["Z"]
run = "plugin fzf"
desc = "Jump to a directory, or reveal a file using fzf"

[[mgr.prepend_keymap]]
on = ["s"]
run = "plugin what-size"
desc = "Calc size of selection or cwd"

[[mgr.prepend_keymap]]
on = ["#", "p"]
run = "plugin toggle-pane min-parent"
desc = "show/hide parent"

[[mgr.prepend_keymap]]
on = ["#", "o"]
run = "plugin toggle-pane max-preview"
desc = "max/min preview"

[[input.prepend_keymap]]
on = "<Esc>"
run = "close"
desc = "Cancel input"

[[mgr.prepend_keymap]]
on = "<C-o>"
run = "plugin open-with-cmd"
desc = "Open with command in the terminal"

[[mgr.prepend_keymap]]
on = "T"
run = "plugin omni-trash"
desc = "Manage Trash"

[[mgr.prepend_keymap]]
on = "<C-d>"
run = "plugin mydiff"
desc = "Diff the selected with the hovered file"

[[mgr.prepend_keymap]]
on = "M"
run = "plugin mount"
desc = "Mount volumes on file system"
