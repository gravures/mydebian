#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio = [1, 1, 2]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
# linemode = "none"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll", "touch", "move", "drag"]

[plugin]
prepend_fetchers = [
  { id = "git", url = "*", run = "git", group = "git" },
  { id = "git", url = "*/", run = "git", group = "git" },
]

prepend_previewers = [
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run = "ouch" },
  # { url = "*.md", run = 'faster-piper -- cat "$1" | mdt' },
  { url = "*.md", run = 'faster-piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
  # { url = "*.md", run = 'piper -- sd "$1" | bat' },
]

[preview]
wrap = "yes"
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]


[opener]
edit = [
  { run = '${EDITOR} "$@"', desc = "Edit with Helix", block = true, for = "linux" },
]
open = [{ run = 'xdg-open "$@"', desc = "Open in desktop", for = "linux" }]
open_krita = [
  { run = 'krita "$@"', desc = "Open with Krita", orphan = true, for = "linux" },
]
open_gimp = [
  { run = 'flatpak run  org.gimp.GIMP "$@"', desc = "Open with Gimp", orphan = true, for = "linux" },
]
read_md = [
  { run = 'frogmouth "$@"', desc = "Open markdown reader", block = true, for = "linux" },
]
view_html = [
  { run = 'links2 "$1"', desc = "Open in terminal web browser", block = true, for = "linux" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$0")"', desc = "Reveal in file browser", for = "linux" },
]
extract = [{ run = 'unroll "$1"', desc = "Extract here", for = "linux" }]
play = [{ run = 'xdg-open "$@"', desc = "Play", orphan = true, for = "linux" }]
exif = [
  { run = '''exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF", for = "linux" },
]

[open]
rules = [
  { url = "*/", use = [
    "edit",
    "open",
    "reveal",
  ] },
  { url = "*.od?", use = [
    "open",
    "reveal",
  ] },
  { url = "*.pdf", use = [
    "open",
    "reveal",
  ] },
  { url = "*.md", use = [
    "read_md",
    "edit",
    "open",
    "reveal",
  ] },
  { url = "*.html", use = [
    "view_html",
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "text/*", use = [
    "edit",
    "reveal",
  ] },
  { mime = "image/*", use = [
    "open",
    "open_krita",
    "open_gimp",
    "reveal",
  ] },
  { mime = "{audio,video}/*", use = [
    "play",
    "reveal",
  ] },
  { mime = "inode/x-empty", use = [
    "edit",
    "reveal",
  ] },
  { mime = "application/*zip", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/json", use = [
    "edit",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
  ] },
]


[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 536870912 # 512MB
image_bound = [0, 0]
suppress_preload = true


