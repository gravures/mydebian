set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

##
# Clean-up root table before loading plugigns
unbind -a -T root
unbind -a -T prefix
# source ~/.config/tmux/tmux-default-keybindings

##
# Prefix Keys
set -g prefix M-Space
set -g prefix2 None

##
# Catppuccin: https://github.com/catppuccin/tmux
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
set -ag status-left "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %a %H:%M"
set -g @catppuccin_directory_text " #{b:session_path}"

# # Pane styling options
set -g @catppuccin_pane_status_enabled "yes" # set to "yes" to enable
set -g @catppuccin_pane_border_status "off"  # set to "yes" to enable
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -g @catppuccin_pane_left_separator "█"
set -g @catppuccin_pane_middle_separator "█"
set -g @catppuccin_pane_right_separator "█"
set -g @catppuccin_pane_color "#{@thm_green}"
set -g @catppuccin_pane_background_color "#{@thm_surface_0}"
set -g @catppuccin_pane_default_text "##{b:pane_current_path}"
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_number_position "left" # right, left

set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"
set -g @catppuccin_window_text " #{?window_linked,[],}#W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_flags "icon"             # none, icon, or text
set -g @catppuccin_window_flags_icon_last " 󰖰"     # -
set -g @catppuccin_window_flags_icon_current " 󰖯"  # *
set -g @catppuccin_window_flags_icon_zoom " 󰁌"     # Z
set -g @catppuccin_window_flags_icon_mark " 󰃀"     # M
set -g @catppuccin_window_flags_icon_silent " 󰂛"   # ~
set -g @catppuccin_window_flags_icon_activity " 󱅫" # #
set -g @catppuccin_window_flags_icon_bell " 󰂞"     # !
# # Matches icon order when using `#F` (`#!~[*-]MZ`)
set -g @catppuccin_window_flags_icon_format "##{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},}##{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},}##{?window_silence_flag,#{E:@catppuccin_window_flags_icon_silent},}##{?window_active,#{E:@catppuccin_window_flags_icon_current},}##{?window_last_flag,#{E:@catppuccin_window_flags_icon_last},}##{?window_marked_flag,#{E:@catppuccin_window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@catppuccin_window_flags_icon_zoom},} "

# # Status line options
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "yes" # yes, no
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_module_bg_color "#{@thm_surface_0}"

##
# Franky Palette
set -g @thm_rosewater "#f5e0dc"
set -g @thm_flamingo "#f2cdcd"
set -g @thm_pink "#fc8dc7"
set -g @thm_mauve "#cba6f7"
set -g @thm_red "#bb3831"
set -g @thm_maroon "#ba8d45"
set -g @thm_peach "#fab387"
set -g @thm_yellow "#ffdeaa"
set -g @thm_green "#57ab5a"
set -g @thm_teal "#94e2d5"
set -g @thm_sky "#539bf5"
set -g @thm_sapphire "#74c7ec"
set -g @thm_blue "#2764b1"
set -g @thm_lavender "#b4befe"
set -g @thm_subtext_1 "#b1b1b1"
set -g @thm_subtext_0 "#a6a596"
set -g @thm_overlay_2 "#909dab"
set -g @thm_overlay_1 "#7f849c"
set -g @thm_overlay_0 "#6f6b58"
set -g @thm_surface_2 "#54595f"
set -g @thm_surface_1 "#373e47"
set -g @thm_surface_0 "#2a2a3c"
set -g @thm_mantle "#110E17"
set -g @thm_crust "#0B090F"

##
# UI Additional Style
set -g pane-border-indicator both
set -g pane-active-border-style "fg=#8268BA"
set -g pane-border-style "fg=#3C3C3C"
set -g pane-scrollbars on
set -g pane-scrollbars-style "bg=black,fg=#54595f,width=1,pad=0"
set -g display-panes-active-colour red
set -g display-panes-colour blue
set -g display-panes-time 1000
set -g message-style "bg=#110E17,fg=#ba8d45"
set -g message-command-style "bg=#110E17,fg=#ba8d45"
set -g message-line 1

##
# Tmux plugin manager: https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

##
# Resurrect: https://github.com/tmux-plugins/tmux-resurrect?tab=readme-ov-file
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-capture-pane-contents on
# set -g @resurrect-processes 'hx lazygit neomutt aichat opencode yazi man ipython'
# set -g @resurrect-restore-script-path /home/gilles/.tmux/plugins/tmux-resurrect/scripts/restore.sh
# set -g @resurrect-save-script-path /home/gilles/.tmux/plugins/tmux-resurrect/scripts/save.sh
# set -g @resurrect-strategy-irb default_strategy
# set -g @resurrect-strategy-mosh-client default_strategy

##
# Bash-Lib
set -g @plugin 'gravures/tmux-bash-lib'
run-shell ~/.tmux/plugins/tmux-bash-lib/plugin.tmux # required manual bootstraping

##
# Helix-sessions
# set -g @plugin 'gravures/tmux-helix-sessions'
run-shell ~/.tmux/plugins/tmux-helix-session/plugin.tmux

##
# Rendez-Vous
set -g @plugin 'gravures/tmux-rendez-vous'
set -g @rendez-vous-linker-bg '#09070D'
set -g @rendez-vous-linker-fg '#b1b1b1'
set -g @rendez-vous-linker-border '#cba6f7'

set -g @rendez-vous-save-scrollback on
set -g @rendez-vous-save-after-hook tmux-hx-session
set -g @rendez-vous-restore-after-hook 'tmux-hx-session restore'

set -g @rendez-vous-save-daemon-enabled on
set -g @rendez-vous-save-daemon-interval 30

##
# Task-Code
# set -g @plugin 'gravures/tmux-task-code'
run-shell ~/.tmux/plugins/tmux-task-code/plugin.tmux
# TODO: test the plugin

##
# Fzf: https://github.com/sainnhe/tmux-fzf
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="?"
TMUX_FZF_ORDER="session|window|pane|command|keybinding|clipboard|process"

##
# Mighty-scroll: https://github.com/noscript/tmux-mighty-scroll
set -g @plugin 'noscript/tmux-mighty-scroll'
set -g @mighty-scroll-select-pane off
set -g @mighty-scroll-interval 1
set -g @mighty-scroll-show-indicator off
set -g @mighty-scroll-by-line 'man less pager neomutt dua links2 w3m lynx buku cha checklist'
set -g @mighty-scroll-by-page ''
set -g @mighty-scroll-pass-through 'vim nvim hx lazygit awrit yazi btop opencode fzf jpterm grepai gs-dash qman glow mdp'
set -g @mighty-scroll-fallback-mode 'history'

##
# Floax: https://github.com/omerxx/tmux-floax
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind '-n C-a'
set -g @floax-bind-menu 'm'
set -g @floax-change-path true
set -g @floax-height "80%"
set -g @floax-width "70%"
set -g @floax-text-color '#c9c9c9'
set -g @floax-border-color "#6f6b58"

##
# Modal: https://github.com/whame/tmux-modal
set -g @plugin 'gravures/tmux-modal#new-commands'
set -g @modal-cmd-icon :
set -g @modal-commands-conf /home/gilles/.config/tmux/tmux-modal-commands.conf
set -g @modal-keybindings-conf /home/gilles/.config/tmux/tmux-modal-keybinds.conf
set -g @modal-show-cmd-keys on
set -g @modal-on-start off
set -g status-left-style fg=RED

##
# tmux-zen-status: https://github.com/gravures/tmux-zen-status
set -g @plugin 'gravures/tmux-zen-status'
set -g @transient-status on
set -g @transient-status-keybindings "M-z C-b"
set -g @transient-status-delay '0'
set -g @transient-status-stall '14.0'

set -g @which-key on
set -g @which-key-bind-prefix '/'
set -g @which-key-bind-root 'C-#'
set -g @which-key-bind-copy "C-'"
set -g @which-key-bg '#09070D'
set -g @which-key-fg '#b1b1b1'
set -g @which-key-border '#cba6f7'
set -g @which-key-escape on
set -g @which-key-noteless on

##
# Links: https://github.com/alberti42/tmux-fzf-links
set -g @plugin 'alberti42/tmux-fzf-links'
unbind '#'
set-option -g @fzf-links-key '#'
set-option -g @fzf-links-history-lines "0"
set-option -g @fzf-links-editor-open-cmd "tmux split-window -f -h hx +%line '%file'"
# set-option -g @fzf-links-browser-open-cmd "tmux split-window -f -h awrit '%url'"
set-option -g @fzf-links-browser-open-cmd "zen '%url'"
set-option -g @fzf-links-fzf-display-options "-w 75% --maxnum-displayed 20 --multi --track --no-preview"
set-option -g @fzf-links-use-colors on
set-option -g @fzf-links-hide-fzf_header on

##
# Tmux-search
run-shell ~/.tmux/plugins/tmux-search/plugin.tmux

##
# Continuum: https://github.com/tmux-plugins/tmux-continuum
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore on

##
# Terminal settings
set -g default-shell /usr/bin/zsh
set -g mouse on
set -s default-terminal tmux-256color
set -sa terminal-overrides ",tmux*:Tc"
set -as terminal-features ",*:hyperlinks"
set -s escape-time 0
set -s extended-keys on
set -s extended-keys-format xterm
set -g allow-passthrough on
set -g focus-events on
set -s set-clipboard on
set -g cursor-style blinking-bar

##
# Session
set -g detach-on-destroy off
set -g history-limit 100000

##
# Status Line
set -g status-keys emacs
set -g status-interval 5
set -g base-index 1
set -g renumber-windows on
# set -s display-time 3000

##
# Commands alias
# set-option -s command-alias[300] "cd=attach-session -t . -c"

##
# Prefix Keybindings
#
bind-key -N 'send-prefix' 'M-Space' send-prefix
bind-key -N 'reload config' 'r' source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."
bind-key -N 'next layout' 'Space' next-layout
bind-key -N 'zoom pane' 'z' resize-pane -Z
bind-key -N 'select layout' 'S' select-layout -E
bind-key -N 'rename session' "'" command-prompt -I "#S" { rename-session "%%" }
bind-key -N 'kill window' 'X' confirm-before -p "kill-window #W? (y/n)" kill-window
bind-key -N 'rename window' ';' command-prompt -I "#W" { rename-window "%%" }
bind-key -N 'last window' '>' last-window
bind-key -N 'last pane' '<' last-pane
bind-key -N 'display pane' 'q' display-panes
bind-key -N 'display message' 'i' display-message
bind-key -N 'show messages' 'S' show-messages
bind-key -N 'choose tree' 't' choose-tree -Zs
bind-key -N 'choose window tree' 'T' choose-tree -Zw
bind-key -N 'clock' 'c' clock-mode
bind-key -N 'command prompt' ':' command-prompt
bind-key -N 'suspend' 'C-z' suspend-client
bind-key -N 'detach' 'd' detach-client
bind-key -N 'lazy-tmux picker' 'f' display-popup -w 75% -h 85% -E 'lazy-tmux picker'
bind-key -N 'save all sessions' 'C-s' run -b 'save-rendez-vous'

##
# Root Keybindings
#
# This should normally not be necessary but as we reset root key table
# at the begining of the script we need the two next lines
#
# M-z -> Modal plugin
# C-f -> Floax plugin
# C-b -> Zen-status plugin
bind-key -n 'MouseDown1Pane' select-pane -t= \; send -M MouseDown1Pane
bind-key -n 'MouseDrag1Border' resize-pane -M -t=
# bind-key -n 'MouseDrag1Border' resize-window -M -t=
bind-key -n 'MouseDown1Status' select-window -t=

bind-key -n -N 'next window' 'M-Right' next-window
bind-key -n -N 'previous-window' 'M-Left' previous-window
bind-key -n -N 'copy mode' 'M-\' copy-mode
bind-key -n -N "rendez-vous" "M-Enter" run 'rendez-vous'
bind-key -n -N 'link window' 'M-Insert' run -b 'window-linker'
bind-key -n -N 'unlink window' 'M-Delete' unlink-window
bind-key -n -N 'todo' 'c-j' display-popup -w 25% -h 80% -x 300 -y 0 -E -d ~/DEV/Notes 'checklist'

# Sesh Integration
# bind -N 'last-session' L last-session
# bind-key -N 'new window' 'n' command-prompt -I "#S" { run sesh window --session "%%"}
bind-key -N TV "V" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh

##
# Copy-mode
set -g mode-keys vi
source ~/.config/tmux/helix.conf # helix motion
# bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
# bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

##
# TPM
run '~/.tmux/plugins/tpm/tpm'
